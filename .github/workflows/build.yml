name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling deps
        run: pip install pyyaml

      - name: Validate manifest
        run: python scripts/validate_manifest.py builds/release.yaml

      - name: Emit matrix
        id: emit
        run: |
          MATRIX=$(python scripts/emit_matrix.py builds/release.yaml)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: write
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          # Key is based on the ORT version, target, and the files that affect
          # the build (manifest + build script). github.sha is intentionally
          # NOT used: ORT is a pinned third-party library, so the cache is
          # valid across commits as long as these inputs haven't changed.
          key: ccache-arm64-ort-${{ matrix.target.ort_version }}-${{ matrix.target.target_id }}-${{ hashFiles('builds/release.yaml', 'scripts/build_target.sh') }}
          restore-keys: |
            ccache-arm64-ort-${{ matrix.target.ort_version }}-${{ matrix.target.target_id }}-
            ccache-arm64-ort-${{ matrix.target.ort_version }}-

      - name: Build Docker image
        run: docker build -t ort-build:local -f docker/lambda-build.Dockerfile docker/

      - name: Build target in Lambda container
        env:
          TARGET_ID: ${{ matrix.target.target_id }}
          ORT_VERSION: ${{ matrix.target.ort_version }}
          QUANT: ${{ matrix.target.quant }}
          HF_REPO_ID: ${{ matrix.target.hf_repo_id }}
          HF_REVISION: ${{ matrix.target.hf_revision }}
          HF_PRIMARY: ${{ matrix.target.hf_primary }}
          HF_COMPANIONS: ${{ matrix.target.hf_companions }}
          BUNDLE_EXTRAS: ${{ matrix.target.bundle_extras }}
          MODEL_METADATA: ${{ matrix.target.model_metadata }}
          CPU_TUNING: ${{ matrix.target.cpu_tuning }}
          EXECUTION_PROVIDER: ${{ matrix.target.execution_provider }}
          MINIMAL_BUILD: ${{ matrix.target.minimal_build }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ~/.cache/ccache output
          docker run --rm \
            -v "$(pwd)/scripts:/scripts:ro" \
            -v "$(pwd)/builds:/manifest:ro" \
            -v "$(pwd)/output:/output" \
            -v "$HOME/.cache/ccache:/root/.cache/ccache" \
            -e TARGET_ID \
            -e ORT_VERSION \
            -e QUANT \
            -e HF_REPO_ID \
            -e HF_REVISION \
            -e HF_PRIMARY \
            -e HF_COMPANIONS \
            -e BUNDLE_EXTRAS \
            -e MODEL_METADATA \
            -e CPU_TUNING \
            -e EXECUTION_PROVIDER \
            -e MINIMAL_BUILD \
            -e HF_TOKEN \
            -e OUTPUT_DIR=/output \
            -e PYTHONUNBUFFERED=1 \
            -e CCACHE_DIR=/root/.cache/ccache \
            ort-build:local \
            /scripts/build_target.sh

      - name: Show ccache stats
        if: always()
        run: docker run --rm -v "$HOME/.cache/ccache:/root/.cache/ccache" -e CCACHE_DIR=/root/.cache/ccache ort-build:local -c "ccache --show-stats"

      - name: Prune stale ccache entries
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_KEY: ccache-arm64-ort-${{ matrix.target.ort_version }}-${{ matrix.target.target_id }}-${{ hashFiles('builds/release.yaml', 'scripts/build_target.sh') }}
        run: |
          gh cache list \
            --repo ${{ github.repository }} \
            --key "ccache-arm64-ort-${{ matrix.target.ort_version }}-${{ matrix.target.target_id }}-" \
            --json id,key \
            | python3 -c "
          import json, sys, subprocess, os
          entries = json.load(sys.stdin)
          current = os.environ['CURRENT_KEY']
          for e in entries:
              if e['key'] != current:
                  subprocess.run(['gh', 'cache', 'delete', str(e['id']),
                                  '--repo', '${{ github.repository }}'], check=True)
                  print(f'Deleted stale cache: {e[\"key\"]}')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.target_id_safe }}_${{ matrix.target.quant }}_linux-arm64
          path: output/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          tag_name: ${{ github.ref_name }}
