onnxruntime:
  version: "v1.27.0"

build:
  container_image: "public.ecr.aws/amazonlinux/amazonlinux:2023"
  target_os: linux
  target_arch: arm64
  cpu_tuning: neoverse-n1
  execution_provider: cpu
  # "extended" is the minimum viable level for a functional CPU-only build.
  # "basic" breaks runtime partitioning (ORT silently drops subgraphs that
  # contain ops not registered at compile time, producing wrong outputs or
  # a segfault).  "extended" keeps the full kernel dispatch table so that
  # the reduced-op build still selects kernels correctly at runtime.
  minimal_build: extended

targets:
  - id: jinaai/jina-embeddings-v5-text-nano-retrieval
    # quant: output scheme; also selects the tarball filename. build_target.sh
    # runs pipeline int8 quantization ONLY for int8|q8; every other label
    # (q4f16 here) is treated as pre-quantized from HF and skips that step.
    quant: q4f16
    bundle_extras:
      - tokenizer.json
      - build-info.json
    metadata:
      model_format: ort
      model_type: bert
      pooling: last_token
      input_kind: retrieval
      query_prefix: "Query: "
      document_prefix: "Document: "
      raw_embedding_dimension: 768
      output_embedding_dimension: 768
      max_length: 8192
      # benchmark: fp32 full-precision golden the benchmark compares this quant's
      # embedding against (informational cosine column, not a gate). All quants of
      # this model share the same fp32 reference for comparable cosine numbers.
      benchmark:
        reference_primary: onnx/model.onnx
        reference_companions:
          - onnx/model.onnx_data
    model:
      repo_id: jinaai/jina-embeddings-v5-text-nano-retrieval
      revision: main
      primary: onnx/model_q4f16.onnx
      companions:
        - onnx/model_q4f16.onnx_data
        - tokenizer.json

  # Additional quants of the same model. The manifest keys uniqueness on
  # (id, quant), so these share the id above and differ only in quant/primary.
  # All are pre-quantized from HF (non-int8/q8 labels), so none trigger the
  # pipeline int8 step. Primarily consumed by the benchmark workflow to compare
  # quantization schemes side by side.
  - id: jinaai/jina-embeddings-v5-text-nano-retrieval
    quant: fp16
    bundle_extras:
      - tokenizer.json
      - build-info.json
    metadata:
      model_format: ort
      model_type: bert
      pooling: last_token
      input_kind: retrieval
      query_prefix: "Query: "
      document_prefix: "Document: "
      raw_embedding_dimension: 768
      output_embedding_dimension: 768
      max_length: 8192
      benchmark:
        reference_primary: onnx/model.onnx
        reference_companions:
          - onnx/model.onnx_data
    model:
      repo_id: jinaai/jina-embeddings-v5-text-nano-retrieval
      revision: main
      primary: onnx/model_fp16.onnx
      companions:
        - onnx/model_fp16.onnx_data
        - tokenizer.json

  - id: jinaai/jina-embeddings-v5-text-nano-retrieval
    quant: q4
    bundle_extras:
      - tokenizer.json
      - build-info.json
    metadata:
      model_format: ort
      model_type: bert
      pooling: last_token
      input_kind: retrieval
      query_prefix: "Query: "
      document_prefix: "Document: "
      raw_embedding_dimension: 768
      output_embedding_dimension: 768
      max_length: 8192
      benchmark:
        reference_primary: onnx/model.onnx
        reference_companions:
          - onnx/model.onnx_data
    model:
      repo_id: jinaai/jina-embeddings-v5-text-nano-retrieval
      revision: main
      primary: onnx/model_q4.onnx
      companions:
        - onnx/model_q4.onnx_data
        - tokenizer.json

  # Pre-quantized "quantized" variant shipped by the model authors
  # (onnx/model_quantized.onnx: block-quantized embedding table, fp32 compute).
  # We ship the authors' export rather than pipeline-produced true int8 because
  # dynamic int8 quantization of every matmul measured only ~0.55 cosine vs fp32
  # for this model (activation outliers the per-tensor scheme can't represent),
  # whereas this export holds ~0.997. The label is NOT int8|q8, so build_target.sh
  # treats the primary as pre-quantized and skips the int8 step (ships as-is).
  - id: jinaai/jina-embeddings-v5-text-nano-retrieval
    quant: quantized
    bundle_extras:
      - tokenizer.json
      - build-info.json
    metadata:
      model_format: ort
      model_type: bert
      pooling: last_token
      input_kind: retrieval
      query_prefix: "Query: "
      document_prefix: "Document: "
      raw_embedding_dimension: 768
      output_embedding_dimension: 768
      max_length: 8192
      benchmark:
        reference_primary: onnx/model.onnx
        reference_companions:
          - onnx/model.onnx_data
    model:
      repo_id: jinaai/jina-embeddings-v5-text-nano-retrieval
      revision: main
      primary: onnx/model_quantized.onnx
      companions:
        - onnx/model_quantized.onnx_data
        - tokenizer.json

  # Pipeline-produced calibrated 4-bit weight quantization (issue #27). Unlike the
  # q4/q4f16 above (jina's uncalibrated RTN 4-bit, ~0.62 cosine vs fp32), this target
  # ships the FP32 primary (onnx/model.onnx) and the build quantizes it in-pipeline
  # with GPTQ (optimize_model.py step 4, --quant-scheme gptq4), fitting per-group
  # weight scales to a calibration set to recover most of the 4-bit gap. The label is
  # q4gptq (NOT int8|q8), which build_target.sh maps to QUANT_SCHEME=gptq4. Kept
  # alongside q4/q4f16 so the benchmark cosine column proves the RTN-vs-GPTQ win
  # side by side before considering promotion.
  - id: jinaai/jina-embeddings-v5-text-nano-retrieval
    quant: q4gptq
    bundle_extras:
      - tokenizer.json
      - build-info.json
    metadata:
      model_format: ort
      model_type: bert
      pooling: last_token
      input_kind: retrieval
      query_prefix: "Query: "
      document_prefix: "Document: "
      raw_embedding_dimension: 768
      output_embedding_dimension: 768
      max_length: 8192
      correctness:
        # PLACEHOLDER — set from scripts/spike_gptq_4bit.py before shipping. GPTQ 4-bit
        # is expected to clear the default 0.99 gate; pin ~0.05 below the measured min
        # pooled cosine. If the spike shows GPTQ ≈ RTN (~0.62), drop this target instead.
        cosine_threshold: 0.90
      benchmark:
        reference_primary: onnx/model.onnx
        reference_companions:
          - onnx/model.onnx_data
    model:
      repo_id: jinaai/jina-embeddings-v5-text-nano-retrieval
      revision: main
      # fp32 full-precision primary — the build quantizes THIS to 4-bit via GPTQ.
      primary: onnx/model.onnx
      companions:
        - onnx/model.onnx_data
        - tokenizer.json
