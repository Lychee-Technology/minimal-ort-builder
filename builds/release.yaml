release:
  name: "v1.0.0"
  notes: ""

onnxruntime:
  version: "v1.24.4"

build:
  container_image: "public.ecr.aws/amazonlinux/amazonlinux:2023"
  target_os: linux
  target_arch: arm64
  cpu_tuning: neoverse-n1
  execution_provider: cpu
  minimal_build: extended

targets:
  - id: jinaai/jina-embeddings-v5-text-nano-retrieval
    model:
      repo_id: jinaai/jina-embeddings-v5-text-nano-retrieval
      revision: main
      primary: onnx/model_q4f16.onnx
      companions:
        - onnx/model_q4f16.onnx_data
